<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <title>SamandAR Marker C — Rod Sign</title>

  <defs>
    <!-- Fine hatching inside bird silhouette -->
    <pattern id="feather-hatch" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="18" x2="18" y2="0" stroke="#111" stroke-width="2.5"/>
      <line x1="-9" y1="18" x2="9"  y2="0" stroke="#111" stroke-width="2.5"/>
      <line x1="9"  y1="18" x2="27" y2="0" stroke="#111" stroke-width="2.5"/>
    </pattern>
    <!-- Dot field outside bird (scaled small pattern) -->
    <pattern id="dot-field" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="3.5" fill="#111"/>
    </pattern>
    <!-- Chevron pattern for top band -->
    <pattern id="chevron" x="0" y="0" width="60" height="40" patternUnits="userSpaceOnUse">
      <polyline points="0,40 30,10 60,40" fill="none" stroke="#111" stroke-width="5"/>
      <polyline points="-30,40 0,10 30,40" fill="none" stroke="#111" stroke-width="5"/>
    </pattern>
    <!-- Diamond lattice for bottom band -->
    <pattern id="diamond" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <polygon points="20,2 38,20 20,38 2,20" fill="none" stroke="#111" stroke-width="3"/>
    </pattern>

    <!-- Clip path for the bird silhouette (asymmetric chimera/phoenix) -->
    <clipPath id="bird-clip">
      <!--
        Phoenix/Chimera silhouette path:
        - Body tilted slightly right
        - Left wing higher and wider than right (asymmetric)
        - Tail feathers spreading to lower-left
        - Head crest pointing upper-right
        All coordinates relative to a 800×800 canvas, centered around (400,400)
      -->
      <path d="
        M 400 310
        C 360 290, 310 270, 270 290
        C 220 315, 180 350, 160 390
        C 140 430, 145 470, 170 490
        C 150 510, 120 530, 90  570
        C 80  590, 95  620, 120 615
        C 145 610, 180 590, 210 570
        C 230 560, 250 545, 265 530
        C 280 540, 300 555, 320 560
        C 340 565, 360 560, 375 550
        C 385 565, 390 590, 388 620
        C 386 650, 375 680, 370 710
        C 368 730, 380 745, 395 740
        C 410 735, 415 715, 416 692
        C 418 665, 412 635, 415 610
        C 420 590, 435 575, 448 565
        C 465 555, 490 550, 510 545
        C 540 535, 570 515, 585 490
        C 600 465, 605 430, 595 400
        C 590 380, 575 360, 555 345
        C 580 330, 610 320, 630 295
        C 650 270, 650 240, 638 220
        C 626 200, 600 195, 580 205
        C 558 216, 545 240, 535 260
        C 520 285, 505 305, 490 315
        C 470 308, 450 300, 430 298
        C 420 296, 410 300, 400 310
        Z
      "/>
    </clipPath>
  </defs>

  <!-- Outer border -->
  <rect width="800" height="800" fill="#111"/>
  <!-- White interior -->
  <rect x="28" y="28" width="744" height="744" fill="#f8f8f8"/>

  <!-- ── Top band: Chevron pattern ─────────────────────────────────── -->
  <rect x="28" y="28" width="744" height="100" fill="url(#chevron)"/>
  <!-- Top band boundary -->
  <line x1="28" y1="128" x2="772" y2="128" stroke="#111" stroke-width="3"/>

  <!-- ── Bottom band: Diamond lattice ──────────────────────────────── -->
  <rect x="28" y="672" width="744" height="100" fill="url(#diamond)"/>
  <!-- Bottom band boundary -->
  <line x1="28" y1="672" x2="772" y2="672" stroke="#111" stroke-width="3"/>

  <!-- ── Interior area (between bands) ─────────────────────────────── -->
  <!-- Dot field covers the whole interior -->
  <rect x="28" y="128" width="744" height="544" fill="url(#dot-field)"/>

  <!-- Bird interior: feather hatching -->
  <g clip-path="url(#bird-clip)">
    <rect x="0" y="0" width="800" height="800" fill="#f8f8f8"/>
    <rect x="0" y="0" width="800" height="800" fill="url(#feather-hatch)" opacity="0.9"/>
  </g>

  <!-- Bird outline: thick stroke for clear edge detection -->
  <path d="
    M 400 310
    C 360 290, 310 270, 270 290
    C 220 315, 180 350, 160 390
    C 140 430, 145 470, 170 490
    C 150 510, 120 530, 90  570
    C 80  590, 95  620, 120 615
    C 145 610, 180 590, 210 570
    C 230 560, 250 545, 265 530
    C 280 540, 300 555, 320 560
    C 340 565, 360 560, 375 550
    C 385 565, 390 590, 388 620
    C 386 650, 375 680, 370 710
    C 368 730, 380 745, 395 740
    C 410 735, 415 715, 416 692
    C 418 665, 412 635, 415 610
    C 420 590, 435 575, 448 565
    C 465 555, 490 550, 510 545
    C 540 535, 570 515, 585 490
    C 600 465, 605 430, 595 400
    C 590 380, 575 360, 555 345
    C 580 330, 610 320, 630 295
    C 650 270, 650 240, 638 220
    C 626 200, 600 195, 580 205
    C 558 216, 545 240, 535 260
    C 520 285, 505 305, 490 315
    C 470 308, 450 300, 430 298
    C 420 296, 410 300, 400 310
    Z
  " fill="none" stroke="#111" stroke-width="6" stroke-linejoin="round"/>

  <!-- Bird eye: solid black circle for anchor point -->
  <circle cx="540" cy="250" r="14" fill="#111"/>
  <circle cx="545" cy="245" r="4"  fill="#f8f8f8"/>

  <!-- Wing feather accent lines (adds internal features) -->
  <line x1="210" y1="390" x2="160" y2="350" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <line x1="190" y1="420" x2="145" y2="390" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <line x1="178" y1="455" x2="142" y2="430" stroke="#111" stroke-width="3" stroke-linecap="round"/>

  <!-- Tail feather lines (asymmetric downward spread) -->
  <line x1="380" y1="610" x2="340" y2="680" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <line x1="390" y1="640" x2="360" y2="720" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="660" x2="390" y2="738" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <line x1="410" y1="660" x2="418" y2="738" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- Head crest (flame-like spikes) -->
  <path d="M 560 210 C 575 180, 590 160, 578 140 C 570 130, 555 150, 550 170"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <path d="M 575 195 C 598 165, 618 148, 605 128 C 596 116, 580 138, 572 162"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Identifier label "C" ─────────────────────────────────────── -->
  <text x="690" y="200" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="#111" opacity="0.12">C</text>

  <!-- ── Asymmetric corner accent (top-right only) ─────────────────── -->
  <polygon points="772,28  700,28  772,100" fill="#111"/>

  <!-- ── Border accent lines ────────────────────────────────────────── -->
  <rect x="28" y="28" width="744" height="744" fill="none" stroke="#111" stroke-width="4"/>
</svg>
